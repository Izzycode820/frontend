query GetInboxConversations {
  inboxConversations {
    edges {
      node {
        id
        customerPhone
        status
        isAiActive
        aiAutonomyMode
        unreadCount
        cartValue
        updatedAt
        lastMessage {
          id
          body
          senderType
          interactiveData
          voiceUrl
          voiceDuration
          voiceWaveform
          mediaType
          mediaMimeType
          latitude
          longitude
          locationName
          locationAddress
          createdAt
        }
        workmanSettings {
          llmProvider
          autoReplyEnabled
        }
        isStateTransitionPaused
        pauseReason
      }
    }
  }
}
