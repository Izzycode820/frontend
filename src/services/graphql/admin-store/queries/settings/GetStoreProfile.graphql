query GetStoreProfile {
  storeProfile {
    id
    storeName
    storeDescription
    storeEmail
    supportEmail
    phoneNumber
    whatsappNumber
    logoUrl
    primaryColor
    secondaryColor
    accentColor
    currency
    timezone
    defaultLocale
    supportedLocales
    orderPrefix
    orderSuffix
    weightUnit
    dimensionUnit
    legalName
    addressLine1
    addressLine2
    city
    state
    postalCode
    country
    createdAt
    updatedAt
  }
}
