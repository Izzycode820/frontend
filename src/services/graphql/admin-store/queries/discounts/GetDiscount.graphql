query GetDiscount($id: ID!) {
  discount(id: $id) {
    id
    code
    name
    method
    discountType
    discountValueType
    value
    customerBuysType
    customerBuysQuantity
    customerBuysValue
    customerBuysProductIds
    customerBuysProducts {
      id
      name
      mediaGallery {
        thumbnailUrl
      }
    }
    customerGetsQuantity
    customerGetsProductIds
    customerGetsProducts {
      id
      name
      mediaGallery {
        thumbnailUrl
      }
    }
    bxgyDiscountType
    bxgyValue
    maxUsesPerOrder
    usageLimit
    usageCount
    usageLimitPerCustomer
    startsAt
    endsAt
    minimumRequirementType
    minimumPurchaseAmount
    minimumQuantityItems
    appliesToAllCustomers
    customerSegmentation
    appliesToAllProducts
    productIds
    products {
      id
      name
      mediaGallery {
        thumbnailUrl
      }
    }
    categoryIds
    collections {
      id
      name
      featuredMedia {
        thumbnailUrl
      }
    }
    appliesToRegions
    appliesToCustomerTypes
    limitTotalUses
    limitOnePerCustomer
    canCombineWithProductDiscounts
    canCombineWithOrderDiscounts
    status
    totalDiscountAmount
    totalOrders
    isActive
    isExpired
    remainingUsage
    createdAt
    updatedAt
  }
}
