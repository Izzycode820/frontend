query GetArticles(
  $blogId: ID
  $blogHandle: String
  $tag: String
  $status: String
  $search: String
  $limit: Int
) {
  articles(
    blogId: $blogId
    blogHandle: $blogHandle
    tag: $tag
    status: $status
    search: $search
    limit: $limit
  ) {
    edges {
      node {
        id
        title
        handle
        isPublished
        statusDisplay
        author
        blog {
          id
          title
          handle
        }
        publishedAt
        createdAt
        url
      }
    }
    totalCount
  }
}
