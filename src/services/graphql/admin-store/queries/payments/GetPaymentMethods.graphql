query GetPaymentMethods {
  paymentMethods {
    id
    providerName
    checkoutUrl
    enabled
    verified
    successRate
    displayName
    totalTransactions
    successfulTransactions
    lastUsedAt
    apiUser
    credentialVerifiedAt
    createdAt
    updatedAt
    capabilities {
      paymentModes
      supportedCurrencies
      supportsRefunds
      supportsWebhooks
      requiresUrl
      requiresCredentials
      displayName
    }
  }
  availableProviders {
    provider
    displayName
    description
    requiresUrl
    requiresCredentials
    alreadyAdded
  }
}
