query MyThemes($workspaceId: ID!) {
  myThemes(workspaceId: $workspaceId) {
    id
    themeName
    themeSlug
    isActive
    isPublished
    isDraft
    canDelete
    createdAt
    lastEditedAt
    publishedAt
    isPasswordProtected
    storefrontPassword
    activeVersion {
      id
      versionNumber
      isSystemUpdate
    }
    template {
      id
      name
      slug
      previewImage
      currentVersion
    }
  }
}
